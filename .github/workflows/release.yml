name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  quality:
    uses: ./.github/workflows/quality.yml

  release:
    runs-on: ubuntu-22.04
    needs: quality
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if tag is on master
        run: |
          git branch -a --contains ${{ github.ref }}
          if ! git branch -a --contains ${{ github.ref }} | grep -q 'master\|main'; then
            echo "This tag is not on the master/main branch"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - run: npm ci
      - run: npm run build

      - name: Extract release notes
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          version="${tag#v}"
          awk -v ver="$version" -f scripts/extract-release-notes.awk CHANGELOG.md > release-notes.md

          if [ ! -s release-notes.md ]; then
            echo "::error::No CHANGELOG.md entry found for version $version"
            exit 1
          fi

          echo "--- release-notes.md ---"
          cat release-notes.md
          echo "--- end ---"

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          gh release create "$tag" \
            --title="$tag" \
            --notes-file release-notes.md \
            dist/main.js dist/manifest.json
